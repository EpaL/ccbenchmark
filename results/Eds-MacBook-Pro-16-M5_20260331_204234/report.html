<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Claude Code Latency Bench</title>
<style>
  body { font-family: system-ui, -apple-system, monospace; margin: 2rem; background: #0d1117; color: #c9d1d9; }
  h1 { color: #58a6ff; border-bottom: 1px solid #30363d; padding-bottom: .5rem; }
  h2 { color: #8b949e; }
  table { border-collapse: collapse; width: 100%; margin: 1rem 0; }
  th, td { padding: 6px 12px; border: 1px solid #30363d; text-align: right; }
  th { background: #161b22; color: #58a6ff; }
  td:first-child { text-align: left; font-weight: 600; }
  tr:nth-child(even) { background: #161b22; }
  .meta { color: #8b949e; font-size: .85em; margin-bottom: 1.5rem; }
  .cold { color: #79c0ff; }
  .warm { color: #56d364; }
</style>
</head>
<body>
<h1>Claude Code Tool Call Latency Bench</h1>
<div class="meta" id="meta"></div>
<h2>Results</h2>
<div id="tbl"></div>
<script>
const csv = `
test_name,iteration,mode,duration_ms,output_bytes,ttfb_ms
shell_cmd_init,1,cold,4.5,11,
shell_open,1,cold,4.0,378,
shell_spawn,1,cold,5.1,31691,
stdout_capture,1,cold,11.4,16,
shell_exec_init,1,cold,21.2,4,
file_edit,1,cold,4.1,0,
git_log_init,1,cold,10.4,156,
git_diff,1,cold,10.3,407,
lookup_capture,1,cold,6.0,4601,
tool_lookup,1,cold,6.3,529,
shell_cmd_init,1,warm,4.2,11,
shell_open,1,warm,3.6,378,
shell_spawn,1,warm,4.8,31691,
stdout_capture,1,warm,11.3,16,
shell_exec_init,1,warm,16.8,4,
file_edit,1,warm,4.1,0,
git_log_init,1,warm,10.3,156,
git_diff,1,warm,11.3,407,
lookup_capture,1,warm,6.4,4601,
tool_lookup,1,warm,5.7,529,
shell_cmd_init,2,warm,4.1,11,
shell_open,2,warm,3.9,378,
shell_spawn,2,warm,5.1,31691,
stdout_capture,2,warm,11.4,16,
shell_exec_init,2,warm,17.1,4,
file_edit,2,warm,4.3,0,
git_log_init,2,warm,11.0,156,
git_diff,2,warm,12.3,407,
lookup_capture,2,warm,6.0,4601,
tool_lookup,2,warm,6.1,529,
cc_baseline,1,warm,3030.4,2,2828.2
cc_bash_tool,1,warm,7667.5,20,7383.0
cc_read_tool,1,warm,6644.2,168,6454.9
cc_edit_tool,1,warm,12490.6,119,12272.8
cc_git_tool,1,warm,19566.7,157,19443.3
cc_multi_tool,1,warm,9881.3,337,9677.0
cc_baseline,2,warm,2701.9,2,2496.3
cc_bash_tool,2,warm,5986.3,20,5778.4
cc_read_tool,2,warm,15518.6,168,15401.2
cc_edit_tool,2,warm,11600.1,169,11392.9
cc_git_tool,2,warm,10614.7,153,10417.7
cc_multi_tool,2,warm,11734.3,101,11573.9
`;
const sysinfo = {
  "platform": "macos",
  "os": "26.4",
  "cpu": "Apple M5 Max",
  "memory_gb": 128,
  "shell": "zsh 5.9 (arm64-apple-darwin25.0)",
  "claude_version": "2.1.81 (Claude Code)",
  "node_version": "v25.8.1",
  "timer": "date +%s%N",
  "timestamp": "2026-04-01T00:42:35Z",
  "iterations": 2,
  "label": ""
};
const rows = csv.trim().split('\n').slice(1).map(r => {
  const c = r.split(',');
  return { test: c[0], iter: +c[1], mode: c[2], dur: +c[3], bytes: +c[4] };
});
document.getElementById('meta').innerHTML =
  `${sysinfo.timestamp} &middot; OS ${sysinfo.os} &middot; ${sysinfo.cpu} &middot; ${sysinfo.memory_gb}GB RAM<br>` +
  `Claude ${sysinfo.claude_version} &middot; Node ${sysinfo.node_version} &middot; ${sysinfo.iterations} warm iterations`;

const tests = [...new Set(rows.map(r => r.test))];
function stats(t, m) {
  const v = rows.filter(r => r.test===t && r.mode===m).map(r => r.dur);
  if (!v.length) return { min:'N/A', mean:'N/A', max:'N/A', sd:'N/A' };
  const n = v.length, s = v.reduce((a,b) => a+b, 0), mn = s/n;
  const sd = n > 1 ? Math.sqrt(v.reduce((a,x) => a+(x-mn)**2, 0)/(n-1)) : 0;
  const f = x => typeof x === 'number' ? x.toFixed(1) : x;
  return { min: f(Math.min(...v)), mean: f(mn), max: f(Math.max(...v)), sd: f(sd) };
}

let h = '<table>';
h += '<tr><th rowspan=2>Test</th><th colspan=4 class="cold">Cold (ms)</th><th colspan=4 class="warm">Warm (ms)</th></tr>';
h += '<tr><th>Min</th><th>Mean</th><th>Max</th><th>StdDev</th><th>Min</th><th>Mean</th><th>Max</th><th>StdDev</th></tr>';
tests.forEach(t => {
  const c = stats(t, 'cold'), w = stats(t, 'warm');
  h += `<tr><td>${t}</td>` +
    `<td>${c.min}</td><td>${c.mean}</td><td>${c.max}</td><td>${c.sd}</td>` +
    `<td>${w.min}</td><td>${w.mean}</td><td>${w.max}</td><td>${w.sd}</td></tr>`;
});
h += '</table>';
document.getElementById('tbl').innerHTML = h;
</script>
</body>
</html>
