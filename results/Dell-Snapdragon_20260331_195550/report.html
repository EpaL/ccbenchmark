<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Claude Code Latency Bench</title>
<style>
  body { font-family: system-ui, -apple-system, monospace; margin: 2rem; background: #0d1117; color: #c9d1d9; }
  h1 { color: #58a6ff; border-bottom: 1px solid #30363d; padding-bottom: .5rem; }
  h2 { color: #8b949e; }
  table { border-collapse: collapse; width: 100%; margin: 1rem 0; }
  th, td { padding: 6px 12px; border: 1px solid #30363d; text-align: right; }
  th { background: #161b22; color: #58a6ff; }
  td:first-child { text-align: left; font-weight: 600; }
  tr:nth-child(even) { background: #161b22; }
  .meta { color: #8b949e; font-size: .85em; margin-bottom: 1.5rem; }
  .cold { color: #79c0ff; }
  .warm { color: #56d364; }
</style>
</head>
<body>
<h1>Claude Code Tool Call Latency Bench</h1>
<div class="meta" id="meta"></div>
<h2>Results</h2>
<div id="tbl"></div>
<script>
const csv = `
test_name,iteration,mode,duration_ms,output_bytes,ttfb_ms
shell_cmd_init,1,cold,68.0,11,
shell_open,1,cold,59.5,378,
shell_spawn,1,cold,81.9,31691,
stdout_capture,1,cold,70.0,16,
shell_exec_init,1,cold,201.0,175,
file_edit,1,cold,74.8,0,
git_log_init,1,cold,69.6,156,
git_diff,1,cold,68.5,618,
lookup_capture,1,cold,68.7,4601,
tool_lookup,1,cold,144.0,529,
shell_cmd_init,1,warm,67.0,11,
shell_open,1,warm,111.7,378,
shell_spawn,1,warm,84.8,31691,
stdout_capture,1,warm,68.6,16,
shell_exec_init,1,warm,146.6,175,
file_edit,1,warm,98.1,0,
git_log_init,1,warm,65.0,156,
git_diff,1,warm,67.7,618,
lookup_capture,1,warm,69.8,4601,
tool_lookup,1,warm,71.8,529,
shell_cmd_init,2,warm,71.8,11,
shell_open,2,warm,55.9,378,
shell_spawn,2,warm,83.4,31691,
stdout_capture,2,warm,71.4,16,
shell_exec_init,2,warm,202.0,175,
file_edit,2,warm,85.8,0,
git_log_init,2,warm,69.3,156,
git_diff,2,warm,67.2,618,
lookup_capture,2,warm,65.1,4601,
tool_lookup,2,warm,73.0,529,
shell_cmd_init,3,warm,67.0,11,
shell_open,3,warm,57.7,378,
shell_spawn,3,warm,78.9,31691,
stdout_capture,3,warm,71.4,16,
shell_exec_init,3,warm,142.3,175,
file_edit,3,warm,90.7,0,
git_log_init,3,warm,65.4,156,
git_diff,3,warm,67.3,618,
lookup_capture,3,warm,64.5,4601,
tool_lookup,3,warm,72.7,529,
`;
const sysinfo = {
  "platform": "windows",
  "os": "Microsoft Windows [Version 10.0.26100.7462]",
  "cpu": "Virtual CPU @ 3.41GHz",
  "memory_gb": 31,
  "shell": "GNU bash, version 5.2.37(1)-release (x86_64-pc-msys)",
  "claude_version": "2.1.87 (Claude Code)",
  "node_version": "unknown",
  "timer": "EPOCHREALTIME (bash builtin)",
  "timestamp": "2026-03-31T23:55:51Z",
  "iterations": 3,
  "label": ""
};
const rows = csv.trim().split('\n').slice(1).map(r => {
  const c = r.split(',');
  return { test: c[0], iter: +c[1], mode: c[2], dur: +c[3], bytes: +c[4] };
});
document.getElementById('meta').innerHTML =
  `${sysinfo.timestamp} &middot; OS ${sysinfo.os} &middot; ${sysinfo.cpu} &middot; ${sysinfo.memory_gb}GB RAM<br>` +
  `Claude ${sysinfo.claude_version} &middot; Node ${sysinfo.node_version} &middot; ${sysinfo.iterations} warm iterations`;

const tests = [...new Set(rows.map(r => r.test))];
function stats(t, m) {
  const v = rows.filter(r => r.test===t && r.mode===m).map(r => r.dur);
  if (!v.length) return { min:'N/A', mean:'N/A', max:'N/A', sd:'N/A' };
  const n = v.length, s = v.reduce((a,b) => a+b, 0), mn = s/n;
  const sd = n > 1 ? Math.sqrt(v.reduce((a,x) => a+(x-mn)**2, 0)/(n-1)) : 0;
  const f = x => typeof x === 'number' ? x.toFixed(1) : x;
  return { min: f(Math.min(...v)), mean: f(mn), max: f(Math.max(...v)), sd: f(sd) };
}

let h = '<table>';
h += '<tr><th rowspan=2>Test</th><th colspan=4 class="cold">Cold (ms)</th><th colspan=4 class="warm">Warm (ms)</th></tr>';
h += '<tr><th>Min</th><th>Mean</th><th>Max</th><th>StdDev</th><th>Min</th><th>Mean</th><th>Max</th><th>StdDev</th></tr>';
tests.forEach(t => {
  const c = stats(t, 'cold'), w = stats(t, 'warm');
  h += `<tr><td>${t}</td>` +
    `<td>${c.min}</td><td>${c.mean}</td><td>${c.max}</td><td>${c.sd}</td>` +
    `<td>${w.min}</td><td>${w.mean}</td><td>${w.max}</td><td>${w.sd}</td></tr>`;
});
h += '</table>';
document.getElementById('tbl').innerHTML = h;
</script>
</body>
</html>
